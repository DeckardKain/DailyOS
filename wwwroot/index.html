<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyOS</title>
    <base href="/DailyOS/" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="DailyOS.styles.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="loading">Loading your system...</div>
    </div>

    <div id="blazor-error-ui" style="display:none;background:#df5b5b;color:#fff;padding:10px;position:fixed;bottom:0;width:100%;z-index:999">
        An error occurred. <a href="" style="color:#fff">Reload</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        (function () {
            var redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.href) {
                history.replaceState(null, null, redirect);
            }
        })();
    </script>
</body>
</html>
